<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 Not Found</title>
<style>
    /* ================= 极客风全局背景 ================= */
    body {
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', "Microsoft YaHei", Arial, sans-serif;
        background-color: #03050a; /* 极深邃的暗黑底色 */
        /* 科技感网格线 */
        background-image: 
            linear-gradient(rgba(0, 242, 254, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 242, 254, 0.05) 1px, transparent 1px);
        background-size: 30px 30px;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #ffffff;
        overflow: hidden;
        position: relative;
    }

    /* 背后跳动的故障红光 */
    body::before {
        content: '';
        position: absolute;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(255, 0, 60, 0.15) 0%, transparent 60%);
        animation: pulseAlert 3s infinite alternate;
        z-index: 0;
    }

    @keyframes pulseAlert {
        0% { transform: scale(0.8); opacity: 0.5; }
        100% { transform: scale(1.2); opacity: 1; }
    }

    /* ================= 悬浮的毛玻璃控制面板 ================= */
    .container {
        text-align: center;
        padding: 50px 70px;
        background: rgba(15, 20, 30, 0.7);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        /* 故障风格的红蓝边框 */
        border-top: 2px solid rgba(255, 0, 60, 0.5);
        border-bottom: 2px solid rgba(0, 242, 254, 0.5);
        border-left: 1px solid rgba(255, 255, 255, 0.05);
        border-right: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255, 0, 60, 0.1);
        position: relative;
        z-index: 10;
        animation: floatContainer 6s ease-in-out infinite;
    }

    @keyframes floatContainer {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
    }

    /* ================= 核心视觉：色散抖动效果的 404 ================= */
    h1 {
        font-size: 110px;
        margin: 0;
        color: #ffffff;
        font-weight: 900;
        letter-spacing: 5px;
        /* 色差偏移（红/蓝3D眼镜效果） */
        text-shadow: 
            4px 4px 0px rgba(255, 0, 60, 0.8), 
            -4px -4px 0px rgba(0, 242, 254, 0.8);
        animation: glitchText 1.5s infinite linear alternate-reverse;
    }

    /* 模拟屏幕故障的文字抽搐动画 */
    @keyframes glitchText {
        0% { text-shadow: 4px 4px 0 #ff003c, -4px -4px 0 #00f2fe; }
        20% { text-shadow: -4px 2px 0 #ff003c, 4px -2px 0 #00f2fe; }
        40% { text-shadow: 2px -4px 0 #ff003c, -2px 4px 0 #00f2fe; }
        60% { text-shadow: -2px 4px 0 #ff003c, 2px -4px 0 #00f2fe; }
        80% { text-shadow: 4px 0px 0 #ff003c, -4px 0px 0 #00f2fe; }
        100% { text-shadow: -2px 0px 0 #ff003c, 2px 0px 0 #00f2fe; }
    }

    p {
        font-size: 20px;
        margin: 20px 0 40px 0;
        color: #a0aec0;
        letter-spacing: 3px;
    }

    /* ================= 逃生通道：返回按钮 ================= */
    .btn {
        display: inline-block;
        padding: 14px 40px;
        font-size: 16px;
        background: transparent;
        color: #00f2fe;
        border: 2px solid #00f2fe;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        text-decoration: none;
        letter-spacing: 2px;
        transition: all 0.3s ease;
        box-shadow: 0 0 10px rgba(0, 242, 254, 0.2), inset 0 0 10px rgba(0, 242, 254, 0.1);
        text-transform: uppercase;
    }

    .btn:hover {
        background: #00f2fe;
        color: #000;
        box-shadow: 0 0 20px rgba(0, 242, 254, 0.6), 0 0 40px rgba(0, 242, 254, 0.4);
        transform: scale(1.05);
    }
</style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>抱歉，您访问的页面不存在！</p>
        <a href="/menu" class="btn">返回首页</a>
    </div>
</body>
</html>
