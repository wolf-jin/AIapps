<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>AI 图像识别助手</title>
    <style>
        /* ================= 极客风全局背景 ================= */
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', "Microsoft YaHei", Arial, sans-serif;
            background-color: #030712;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            color: #e2e8f0;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at center, rgba(0, 242, 254, 0.05) 0%, transparent 60%),
                linear-gradient(rgba(0, 242, 254, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 254, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
        }

        .top-bar {
            padding: 15px 25px;
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(0, 242, 254, 0.2);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .back-btn {
            padding: 8px 20px;
            border: 1px solid #00f2fe;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.5);
            color: #00f2fe;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.1);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(0, 242, 254, 0.15);
            box-shadow: inset 0 0 15px rgba(0, 242, 254, 0.4), 0 0 20px rgba(0, 242, 254, 0.4);
            transform: translateY(-2px);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: rgba(0,0,0,0.4);
            position: relative;
        }

        .message {
            max-width: 75%;
            padding: 15px 20px;
            border-radius: 12px;
            line-height: 1.6;
            word-wrap: break-word;
            font-size: 14px;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .user {
            background: linear-gradient(135deg, #1e3a8a, #0369a1);
            color: #f8fafc;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            box-shadow: 0 5px 15px rgba(3, 105, 161, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .assistant {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(5px);
            color: #00f2fe;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid rgba(0, 242, 254, 0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), inset 0 0 15px rgba(0, 242, 254, 0.05);
        }

        .message img {
            max-width: 280px;
            border-radius: 4px;
            display: block;
            margin-top: 10px;
            border: 2px solid rgba(0, 242, 254, 0.5);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
        }

        .input-box {
            display: flex;
            padding: 20px 25px;
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 242, 254, 0.2);
            gap: 15px;
            align-items: center;
        }

        input[type="file"] {
            flex: 1;
            border-radius: 8px;
            border: 1px dashed rgba(0, 242, 254, 0.4);
            padding: 8px 15px;
            background: rgba(0, 0, 0, 0.6);
            color: #a0aec0;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        input[type="file"]:hover {
            background: rgba(0, 242, 254, 0.05);
            border-color: #00f2fe;
        }

        input[type="file"]::file-selector-button {
            border: 1px solid #00f2fe;
            background: rgba(0, 242, 254, 0.1);
            padding: 8px 16px;
            border-radius: 6px;
            color: #00f2fe;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-right: 15px;
        }

        input[type="file"]::file-selector-button:hover {
            background: #00f2fe;
            color: #000;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
        }

        button[type="submit"] {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #000;
            font-size: 14px;
            cursor: pointer;
            font-weight: 800;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.3);
            transition: all 0.3s ease;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 242, 254, 0.6);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 242, 254, 0.3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0, 242, 254, 0.6); }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="back-btn" onclick="window.location.href='/menu'">← 返回</button>
    </div>

    <div class="chat-container" id="chat-container"></div>

    <form class="input-box" id="upload-form">
        <input type="file" id="image-input" accept="image/*" required>
        <button type="submit">发送图片</button>
    </form>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const uploadForm = document.getElementById('upload-form');
        const imageInput = document.getElementById('image-input');

        function appendMessage(role, content, imageUrl = null) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', role);

            // 恢复原版拼接格式
            msgDiv.innerHTML = `<b>${role === 'user' ? '你' : 'AI'}:</b> ${content}`;

            if (imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                msgDiv.appendChild(img);
            }

            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!imageInput.files.length) return;

            const file = imageInput.files[0];
            const reader = new FileReader();
            reader.onload = async function(event) {
                const base64Url = event.target.result;
                const base64Data = base64Url.split(',')[1];

                // 恢复原版文字
                appendMessage('user', `已上传图片: ${file.name}`, base64Url);

                const payload = { filename: file.name, image: base64Data };

                try {
                    const response = await fetch('/upload/send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    // 恢复原版文字
                    if (!response.ok) throw new Error("上传失败");

                    const data = await response.json();
                    // 恢复原版拼接格式
                    const aiText = `识别结果: ${data.class_name} (置信度: ${Math.round(data.confidence * 100)}%)`;
                    appendMessage('assistant', aiText);

                } catch (err) {
                    // 恢复原版报错文字
                    appendMessage('assistant', `[错误] 无法连接到服务器或上传失败: ${err.message}`);
                }

                imageInput.value = '';
            };

            reader.readAsDataURL(file);
        });
    </script>

</body>
</html>
