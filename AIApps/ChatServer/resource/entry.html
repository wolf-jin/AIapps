<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡码AI助手</title>
<style>
    /* 全局动态流光背景 */
    body {
        font-family: 'Segoe UI', "Microsoft YaHei", Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        /* 动态渐变背景 */
        background: linear-gradient(-45deg, #0f172a, #1e293b, #312e81, #0f172a);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        color: #ffffff;
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    h1.title {
        font-size: 38px;
        font-weight: 800;
        text-align: center;
        margin-bottom: 35px;
        letter-spacing: 2px;
        /* 科技感文字发光效果 */
        background: linear-gradient(to right, #4facfe, #00f2fe);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
    }

    /* 毛玻璃质感卡片容器 */
    .container {
        width: 380px;
        padding: 40px 30px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px); /* 核心：背景模糊 */
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2), inset 0 0 0 1px rgba(255,255,255,0.05);
        box-sizing: border-box;
        text-align: center;
        transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .container:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.3), 0 0 20px rgba(0, 242, 254, 0.2);
    }

    h2 {
        font-size: 24px;
        margin-bottom: 25px;
        font-weight: 400;
        letter-spacing: 1px;
    }

    .form-group {
        margin-bottom: 20px;
        text-align: left;
    }

    .form-group label {
        display: block;
        font-size: 13px;
        color: #a0aec0;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    /* 炫酷的输入框 */
    .form-group input {
        width: 100%;
        padding: 12px 15px;
        font-size: 15px;
        color: #ffffff;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.2);
        outline: none;
        box-sizing: border-box;
        transition: all 0.3s ease;
    }

    .form-group input::placeholder {
        color: #4a5568;
    }

    .form-group input:focus {
        border-color: #00f2fe;
        background: rgba(0, 0, 0, 0.4);
        box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
    }

    /* 赛博发光按钮 */
    .btn {
        width: 100%;
        padding: 14px;
        margin-top: 10px;
        font-size: 16px;
        background: linear-gradient(45deg, #4facfe 0%, #00f2fe 100%);
        color: #ffffff;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        letter-spacing: 1px;
        box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
        transition: all 0.3s ease;
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0, 242, 254, 0.6);
    }

    .switch {
        margin-top: 20px;
        font-size: 13px;
        color: #a0aec0;
    }

    .switch a {
        color: #00f2fe;
        text-decoration: none;
        cursor: pointer;
        font-weight: bold;
        transition: color 0.3s ease;
    }

    .switch a:hover { 
        color: #ffffff;
        text-shadow: 0 0 8px #00f2fe;
    }

    #register-container { display: none; }

    /* 悬浮成功提示框 */
    #success-alert {
        position: fixed;
        top: 30px;
        left: 50%;
        transform: translateX(-50%) translateY(-20px);
        background: rgba(0, 242, 254, 0.9);
        color: #000;
        padding: 12px 30px;
        border-radius: 30px;
        box-shadow: 0 10px 25px rgba(0, 242, 254, 0.4);
        display: none;
        z-index: 1000;
        font-weight: bold;
        letter-spacing: 1px;
        backdrop-filter: blur(5px);
        animation: slideDown 0.3s forwards;
    }

    @keyframes slideDown {
        to { transform: translateX(-50%) translateY(0); }
    }
</style>
</head>
<body>
<div id="success-alert">提示信息</div>

<div>
    <h1 class="title">卡码AI助手</h1>

    <div class="container" id="login-container">
        <h2>登录枢纽</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="login-username">用户名</label>
                <input type="text" id="login-username" placeholder="请输入你的ID" required>
            </div>
            <div class="form-group">
                <label for="login-password">安全密钥</label>
                <input type="password" id="login-password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn">登陆</button>
        </form>
        <div class="switch">
            尚未注册身份？<a onclick="showRegister()">去注册</a>
        </div>
    </div>

    <div class="container" id="register-container">
        <h2>注册身份</h2>
        <form id="register-form">
            <div class="form-group">
                <label for="register-username">用户名</label>
                <input type="text" id="register-username" placeholder="请创建你的ID" required>
            </div>
            <div class="form-group">
                <label for="register-password">安全密钥</label>
                <input type="password" id="register-password" placeholder="请设置密码" required>
            </div>
            <button type="submit" class="btn">注册接入</button>
        </form>
        <div class="switch">
            已拥有身份？<a onclick="showLogin()">返回授权</a>
        </div>
    </div>
</div>

<script>
// 这里是你原封不动的 JS 业务逻辑，完全没动！
function showAlert(message){
    const alertBox = document.getElementById('success-alert');
    alertBox.textContent = message;
    alertBox.style.display = 'block';
    setTimeout(()=>{alertBox.style.display='none';},2000); // 稍微延长了一点提示展示时间
}
function showRegister(){ document.getElementById('login-container').style.display='none'; document.getElementById('register-container').style.display='block'; }
function showLogin(){ document.getElementById('register-container').style.display='none'; document.getElementById('login-container').style.display='block'; }

// 登录
document.getElementById('login-form').addEventListener('submit', function(e){
    e.preventDefault();
    const username=document.getElementById('login-username').value;
    const password=document.getElementById('login-password').value;

    fetch('/login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username,password})
    }).then(response=>{
        if(response.status===403){ showAlert('账号已在其他地方登录！'); throw new Error('已在其他地方登录'); }
        const contentType = response.headers.get('content-type');
        if(response.status===200){
            if(contentType && contentType.includes('application/json')) return response.json();
            else throw new Error('返回格式错误');
        }else if(response.status===401){ showAlert('账号或密码错误！'); throw new Error('认证失败'); }
        else throw new Error('请求失败');
    }).then(data=>{
        if(data && data.userId){ sessionStorage.setItem('userId', data.userId); showAlert('授权成功，正在接入...'); setTimeout(() => { window.location.href='/menu'; }, 800); }
        else throw new Error('无效的响应数据');
    }).catch(error=>{
        console.error('Error:',error);
        if(!error.message.includes('已在其他地方登录')&&!error.message.includes('认证失败')) showAlert('操作失败，请重试');
    });
});

// 注册
document.getElementById('register-form').addEventListener('submit', function(e){
    e.preventDefault();
    const username=document.getElementById('register-username').value;
    const password=document.getElementById('register-password').value;

    fetch('/register',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username,password})
    }).then(response=>{
        if(response.status===200){
            showAlert('身份注册成功！');
            document.getElementById('login-username').value=username;
            document.getElementById('login-password').value=password;
            setTimeout(showLogin,1000);
        }else if(response.status===409){ showAlert('该 ID 已被占用，请更换！'); }
    }).catch(error=>console.error('注册错误:',error));
});
</script>
</body>
</html>
