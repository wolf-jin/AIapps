<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到AI助手界面</title>

    <link rel="icon" href="data:;base64,=">

    <style>
        /* ================= 全局太空与网格背景 ================= */
        /* ================= 全局太空与网格背景 ================= */
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', "Microsoft YaHei", Arial, sans-serif;
            color: #fff;
            overflow: hidden;
            background-color: #050814;
            /* 叠加一层极客网格 */
            background-image: 
                linear-gradient(rgba(0, 195, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 195, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            position: relative;
            
            /* 👇 就是加了下面这一行！强制让背景撑满整个屏幕的高度 */
            height: 100vh; 
            width: 100vw;
        }

        /* 底部暗蓝色光晕 */
        body::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 40%;
            background: radial-gradient(ellipse at bottom, rgba(0, 195, 255, 0.15) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* 强化版的星空动画 */
        .stars {
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 5px #fff, 0 0 10px rgba(0, 195, 255, 0.5);
            animation: twinkling 3s infinite ease-in-out alternate;
            z-index: 1;
        }

        @keyframes twinkling {
            0% { opacity: 0.1; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.5); }
        }

        /* ================= 系统启动/加载界面 ================= */
        #loading-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        #loading-title {
            font-size: 2.5em;
            margin-bottom: 40px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 5px;
            /* 科技感文字断层发光 */
            text-shadow: 0 0 10px rgba(0, 195, 255, 0.8), 0 0 20px rgba(0, 139, 255, 0.5);
            animation: textPulse 2s infinite alternate;
        }

        @keyframes textPulse {
            0% { text-shadow: 0 0 10px rgba(0, 195, 255, 0.5); opacity: 0.8; }
            100% { text-shadow: 0 0 20px rgba(0, 195, 255, 1), 0 0 40px rgba(0, 225, 255, 0.8); opacity: 1; }
        }

        /* 赛博风进度条 */
        .progress-bar {
            width: 400px;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 195, 255, 0.2);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 195, 255, 0.1) inset;
            position: relative;
        }

        .progress-bar-inner {
            height: 100%;
            background: linear-gradient(90deg, #008bff, #00c3ff, #00fff7);
            width: 0;
            border-radius: 20px;
            transition: width 0.2s ease-out;
            box-shadow: 0 0 15px rgba(0, 195, 255, 0.8);
            position: relative;
        }

        /* 进度条头部的发光点 */
        .progress-bar-inner::after {
            content: '';
            position: absolute;
            right: 0; top: -2px;
            width: 12px; height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px #00fff7;
        }

        #loading-text {
            margin-top: 25px;
            font-size: 1em;
            color: #8da0b3;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ================= 主菜单面板 ================= */
        #menu-container {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            padding: 50px 40px;
            width: 480px;
            /* 终极毛玻璃质感面板 */
            background: rgba(10, 15, 25, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 195, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 10px rgba(0, 195, 255, 0.1);
            animation: panelPopUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            z-index: 10;
        }

        @keyframes panelPopUp {
            from { opacity: 0; transform: translate(-50%, -40%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        h1 {
            font-size: 2.2em;
            margin-top: 0;
            margin-bottom: 20px;
            color: #ffffff;
            font-weight: 800;
            text-shadow: 0 0 15px rgba(0, 195, 255, 0.5);
            letter-spacing: 2px;
        }

        /* 动态霓虹分割线 */
        .menu-border {
            margin: 0 auto 35px auto;
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00c3ff, transparent);
            box-shadow: 0 0 15px #00c3ff;
            opacity: 0.7;
        }

        /* 全息悬浮菜单按钮 */
        .menu-option {
            margin: 18px 0;
            font-size: 1.2em;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 16px 25px;
            border-radius: 12px;
            display: block;
            background: rgba(0, 195, 255, 0.05);
            border: 1px solid rgba(0, 195, 255, 0.2);
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
        }

        /* 按钮悬停光扫效果 */
        .menu-option::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
        }

        .menu-option:hover {
            background: rgba(0, 195, 255, 0.15);
            color: #ffffff;
            border-color: #00c3ff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3), 0 0 20px rgba(0, 195, 255, 0.3);
            text-shadow: 0 0 8px rgba(0, 195, 255, 0.8);
        }

        .menu-option:hover::before {
            left: 100%;
        }

        /* 退出登录的特殊警告色 */
        #logout {
            margin-top: 30px;
            background: rgba(255, 50, 50, 0.05);
            border-color: rgba(255, 50, 50, 0.2);
            color: #fca5a5;
        }

        #logout:hover {
            background: rgba(255, 50, 50, 0.15);
            border-color: #ff3232;
            color: #ffffff;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3), 0 0 20px rgba(255, 50, 50, 0.3);
            text-shadow: 0 0 8px rgba(255, 50, 50, 0.8);
        }

    </style>
</head>

<body>
    
    <script>
        for (let i = 0; i < 80; i++) {
            let star = document.createElement("div");
            star.className = "stars";
            star.style.top = Math.random() * window.innerHeight + "px";
            star.style.left = Math.random() * window.innerWidth + "px";
            // 让星星有大有小，增加景深
            let size = Math.random() * 2 + 1;
            star.style.width = size + "px";
            star.style.height = size + "px";
            star.style.animationDuration = 2 + Math.random() * 3 + "s";
            document.body.appendChild(star);
        }
    </script>

    
    <div id="loading-container">
        <div id="loading-title">AI 助手 启动中...</div>
        <div class="progress-bar">
            <div class="progress-bar-inner"></div>
        </div>
        <div id="loading-text">系统正在初始化，请稍候...</div>
    </div>

    
    <div id="menu-container">
        <h1>✨ 欢迎来到 AI 助手 ✨</h1>
        <div class="menu-border"></div>
        <div class="menu-option" id="chat-service">[1] 进入 AI 聊天助手</div>
        <div class="menu-option" id="image-service">[2] 进入 AI 图像识别助手</div>
        <div class="menu-option" id="logout">[0] 退出登录</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const progressBar = document.querySelector('.progress-bar-inner');
            const loadingContainer = document.getElementById('loading-container');
            const menuContainer = document.getElementById('menu-container');

            
            let percent = 0;
            let interval = setInterval(() => {
                percent += 10;
                progressBar.style.width = percent + "%";
                if (percent >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        loadingContainer.style.display = 'none';
                        menuContainer.style.display = 'block';
                    }, 300);
                }
            }, 200);
        });

        // 进入AI服务
        function loadService(path, errorMsg) {
            fetch(path, { method: 'GET', headers: { 'Accept': 'text/html' } })
                .then(res => res.text())
                .then(html => { document.open(); document.write(html); document.close(); })
                .catch(() => alert(errorMsg));
        }

        document.getElementById('chat-service').addEventListener('click', () => loadService('/chat', '进入AI聊天服务异常！'));
        document.getElementById('image-service').addEventListener('click', () => loadService('/upload', '进入AI图像识别服务异常！'));
        document.getElementById('logout').addEventListener('click', () => {
            const userId = sessionStorage.getItem('userId');
            fetch('/user/logout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: userId, type: 'manual', gameType: 0 })
            })
                .then(res => {
                    if (!res.ok) throw new Error('Logout failed');
                    return fetch('/', { method: 'GET', headers: { 'Accept': 'text/html' } });
                })
                .then(res => res.text())
                .then(html => {
                    sessionStorage.clear();
                    document.open();
                    document.write(html);
                    document.close();
                })
                .catch(() => alert('退出登录失败！'));
        });

        // 页面刷新/关闭时自动登出
        window.addEventListener('beforeunload', function () {
            const userId = sessionStorage.getItem('userId');
            if (userId) {
                const data = new Blob([JSON.stringify({ userId: userId, type: 'refresh', gameType: 0 })],
                    { type: 'application/json' });
                navigator.sendBeacon('/user/logout', data);
            }
        });

        // 页面加载时用户检查
        /*👇 暂时注释掉，调完 UI 再打开
        window.addEventListener('load', function () {
            const userId = sessionStorage.getItem('userId');
            if (!userId) {
                window.location.href = '/entry';
            }
        });
        */
    </script>
</body>
</html>
